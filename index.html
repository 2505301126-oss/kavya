<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalCart - Ecommerce</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->

    <header>

        <div class="logo">GlobalCart</div>

        <input type="text" id="search" placeholder="Search products...">

        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Deals</a>
            <a href="#">Contact</a>
        </nav>

        <div class="cart">

            <button id="themeToggle">🌙</button>

            🛒 Cart <span id="cart-count">0</span>

        </div>

    </header>

    <!-- HERO SECTION -->

    <section class="hero">

        <h1>Shop Worldwide Products</h1>
        <p>Best Deals | Fast Delivery | Secure Payment</p>
        <button>Shop Now</button>

    </section>

    <!-- PRODUCTS -->

    <section class="products" id="product-list">

    </section>

    <!-- FOOTER -->

    <footer>

        <p>© 2026 GlobalCart | All Rights Reserved</p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
